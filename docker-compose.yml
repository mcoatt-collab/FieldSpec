version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flyspec-db
    environment:
      POSTGRES_USER: flyspec
      POSTGRES_PASSWORD: flyspec_dev_password
      POSTGRES_DB: flyspec
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: flyspec-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
